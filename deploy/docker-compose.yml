# Papyr production docker-compose
# Single backend service + Nginx reverse proxy
# Hardened: read-only fs, dropped caps, no-new-privileges, mem/cpu limits

name: papyr-prod

services:
  backend:
    # Image reference is overridable via PAPYR_BACKEND_IMAGE env var.
    # Default to local tag for MIG-009/010 standalone tests.
    # MIG-013 first deploy switches to GHCR-pinned digest:
    #   PAPYR_BACKEND_IMAGE=ghcr.io/fazulfi/papyr-backend@sha256:abc...
    image: ${PAPYR_BACKEND_IMAGE:-papyr-backend:test}
    container_name: papyr-backend
    restart: unless-stopped

    # Resource limits (8GB RAM, 4 cores total → leave 4GB + 0.5 core for system + Nginx)
    deploy:
      resources:
        limits:
          cpus: '3.5'
          memory: 4G
        reservations:
          memory: 1G

    # Security hardening
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN          # for some apt packages cleanup at boot
      - DAC_OVERRIDE   # for tini + signal handling
      - SETGID
      - SETUID

    # Writable areas (tmpfs, ephemeral)
    tmpfs:
      - /tmp:exec,mode=1777,size=512M
      - /home/appuser/.cache:size=128M
    volumes:
      # Persistent temp dir for LibreOffice/OCRmyPDF subprocess (needs exec).
      # IMPORTANT: with userns-remap=default in /etc/docker/daemon.json
      # the container UID 1001 maps to host UID 101001. Run
      # `sudo chown 101001:101001 /opt/papyr/temp` before first compose up,
      # otherwise the appuser inside the container cannot write here.
      - /opt/papyr/temp:/opt/papyr/temp:rw
      # Read-only env file
      - /opt/papyr/production/.env:/app/.env:ro

    environment:
      ENVIRONMENT: production
      TMPDIR: /opt/papyr/temp

    # Use the .env file mounted above
    env_file:
      - /opt/papyr/production/.env

    # Internal port — Nginx will proxy to this
    expose:
      - "8000"
    # Don't publish port to host — only Nginx talks to backend

    networks:
      - papyr-net

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=papyr-backend"

  nginx:
    image: nginx:1.27-alpine
    container_name: papyr-nginx
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE   # to bind 80/443

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /opt/papyr/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/papyr/logs/nginx:/var/log/nginx

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - papyr-net

    # Healthcheck depends on a /health route in nginx config (added at MIG-010).
    # Disabled here so MIG-009 standalone validation does not require it.

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=papyr-nginx"

networks:
  papyr-net:
    driver: bridge
    name: papyr-net
    ipam:
      config:
        - subnet: 172.30.30.0/24
